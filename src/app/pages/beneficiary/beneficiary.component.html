<div class="container mx-auto py-20 lg:px-20 font-ibm">
  <!-- Breadcrumb -->
  <nav class="flex text-sm text-secondary-paragraph mb-6">
    <span class="text-primary-paragraph hover:underline">
      {{ "BENEFICIARY.breadcrumb.parent" | translate }}
    </span>
    <span class="mx-2">›</span>
    <span class="font-semibold text-text-display">
      {{ "BENEFICIARY.breadcrumb.current" | translate }}
    </span>
  </nav>

  <!-- Title & Description -->
  <h1 class="font-bold text-3xl text-text-display mb-4">
    {{ "BENEFICIARY.page.title" | translate }}
  </h1>
  <hr class="border-0 mb-12" />

  <div class="grid lg:grid-cols-3 gap-4">
    <div
      *ngFor="let section of aboutSections"
      class="border border-gray-200 rounded-xl p-6 flex flex-col justify-between hover:shadow transition"
    >
      <!-- Text content in the middle -->
      <div class="flex-grow flex items-center">
        <p class="font-semibold text-[#1f2a37] text-sm">
          {{ section.title | translate }}
        </p>
      </div>

      <!-- Download button at the bottom-right -->
      <div class="flex justify-end mt-4">
        <button
          (click)="downloadFile(section.link)"
          class="w-35 h-8 rounded-sm bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition"
        >
          {{ 'BENEFICIARY.page.download' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
