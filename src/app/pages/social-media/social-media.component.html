<div class="container mx-auto py-20 lg:px-20 font-ibm">
  <!-- Breadcrumb -->
  <nav class="flex text-sm text-secondary-paragraph mb-6">
    <a routerLink="/" class="text-primary-paragraph hover:underline">
      {{ "SOCIALMEDIA.breadcrumb.parent" | translate }}
    </a>
    <span class="mx-2">›</span>
    <span class="font-semibold text-text-display">
      {{ "SOCIALMEDIA.breadcrumb.current" | translate }}
    </span>
  </nav>

  <!-- Title & Description -->
  <h1 class="font-bold text-3xl text-text-display mb-4">
    {{ "SOCIALMEDIA.page.title" | translate }}
  </h1>
  <hr class="border-0 mb-12" />

  <!-- Cards Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let section of aboutSections"
      class="border border-gray-200 rounded-xl p-6 flex flex-col justify-between h-56 hover:shadow transition"
    >
      <!-- Icon at the top -->
      <div class="self-start mb-2">
        <div class="rounded-full bg-[#eafaf1] p-2 flex items-center justify-center">
          <img [src]="section.icon" [alt]="section.title" class="w-5 h-5" />
        </div>
      </div>

      <!-- Text content in the middle -->
      <div class="flex-grow flex items-center">
        <p class="font-semibold text-[#1f2a37] text-sm">
          {{ section.title | translate }}
        </p>
      </div>

      <!-- Button at the bottom-right -->
      <div class="flex justify-end mt-4">
        <a
          *ngIf="!section.link.startsWith('http')"
          [routerLink]="section.link"
          class="w-8 h-8 rounded bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition"
        >
          <img
            src="assets/images/Right-arrow.svg"
            alt="Go"
            class="w-4 h-4"
            [ngClass]="{ 'rtl': isRtl }"
          />
        </a>
        <a
          *ngIf="section.link.startsWith('http')"
          [href]="section.link"
          target="_blank"
          rel="noopener"
          class="w-8 h-8 rounded bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition"
        >
          <img
            src="assets/images/Right-arrow.svg"
            alt="Go"
            class="w-4 h-4"
            [ngClass]="{ 'rtl': isRtl }"
          />
        </a>
      </div>
    </div>
  </div>
  <p class="text-sm text-semibold text-center ltr:text-left rtl:text-right">
        {{ 'SOCIALMEDIA.page.guidelines' | translate}}
        <a routerLink="/page-not-found" class="text-[#1B8354] hover:underline">{{ 'SOCIALMEDIA.page.click' | translate}}</a>
    </p>
</div>
