<section class="partners-section container mx-auto py-5xl px-lg lg:px-0">
  <div class="partners-header mb-4">
    <h2 class="font-bold text-xl-bold-font-size">
      {{ "PARTNERS.TITLE" | translate }}
    </h2>
  </div>

  <div class="partners-content mt-4">
    <p-carousel
      [value]="partners"
      [numVisible]="5"
      [numScroll]="1"
      [responsiveOptions]="responsivePartnersOptions"
      ngClass="partners-carousel"
    >
      <ng-template let-item #item>
        <a
          [href]="item.link"
          target="_blank"
          rel="noopener noreferrer"
          class="block no-underline"
        >
          <div
            class="partner-card bg-white border border-neutral-primary rounded-xl w-44 h-44 flex items-center justify-center m-2 transition-shadow hover:shadow-lg"
          >
            <img
              [src]="item.logo"
              [alt]="item.name"
              class="max-w-[80%] max-h-[80%] object-contain"
            />
          </div>
        </a>
      </ng-template>
    </p-carousel>
  </div>
</section>
