<div class="container mx-auto py-5xl lg:px-md">
  <!-- Breadcrumb -->
  <nav class="flex text-sm text-secondary-paragraph mb-6">
    <a routerLink="/" class="text-primary-paragraph hover:underline">
      {{ 'MAIN_GOALS.BREADCRUMB.HOME' | translate }}
    </a>
    <span class="mx-2">›</span>
    <span class="font-semibold text-text-display">
      {{ 'MAIN_GOALS.BREADCRUMB.CURRENT' | translate }}
    </span>
  </nav>

  <!-- Page title -->
  <h1 class="font-bold text-3xl text-text-display mb-4 text-center">
    {{ 'MAIN_GOALS.TITLE' | translate }}
  </h1>

  <hr class="border-neutral-primary mb-12" />

  <!-- Goals Section -->
  <section class="mb-12">
    <div class="bg-white rounded-lg shadow p-6 border border-neutral-primary">
      <h2 class="font-bold text-xl text-primary-color mb-2 border-b-2 border-primary-color pb-2">
        {{ 'MAIN_GOALS.GOALS_TITLE' | translate }}
      </h2>
      <ol class="list-decimal list-inside text-lg leading-8 pr-6">
        <li *ngFor="let goal of [0,1,2,3,4,5,6,7]">{{ ('MAIN_GOALS.GOALS.' + goal) | translate }}</li>
      </ol>
    </div>
  </section>
</div>
