<div class="container mx-auto py-10 lg:px-10">
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 mt-10">
    <div *ngFor="let m of municipalities" class="w-full rounded-[18px] shadow-sm hover:shadow-lg border border-gray-200 bg-white overflow-hidden relative" style="background-image: url('assets/images/card-pattern.svg'); background-repeat: repeat;">
      <div class="relative p-6 flex flex-col gap-5 items-center">
        <img src="assets/images/البلديات.png" alt="municipality icon" width="70" height="70" class="mb-2" />
        <h4 class="text-center font-bold text-lg">
           {{ 'municipalities.' + m.key + '.name' | translate }}
        </h4>
        <div class="flex justify-center w-full">
          <a class="inline-flex items-center text-base w-max rounded-full py-2 px-10 hover:no-underline hover:bg-green-800 hover:text-green-600 transition bg-white text-green-800 border-2 border-green-800" [routerLink]="['/municipalities', m.key]">
            {{ 'DETAILS' | translate }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
